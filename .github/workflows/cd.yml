name: CI/CD Pipeline (Manual)

on:
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  PROJECT_PATH: /home/jayce/jaycestuff

jobs:
  sync:
    name: Sync Repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force pull repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            echo "✓ Repository updated successfully"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - uses: actions/checkout@v4

      - name: Run linter
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}

            # Lint JS/TS
            biome check .

            # Ensure Go 1.23+ is available (install to ~/go1.23 if needed)
            export PATH=$HOME/go1.23/bin:$PATH
            if ! go version 2>/dev/null | grep -qE 'go1\.(2[3-9]|[3-9][0-9])'; then
              mkdir -p $HOME/go1.23
              curl -sL https://go.dev/dl/go1.23.6.linux-amd64.tar.gz | tar -C $HOME/go1.23 --strip-components=1 -xzf -
            fi

            # Lint Go
            cd vibetradez.com/server && golangci-lint run ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}

            rm -rf jaycebordelon.com/.next jaycebordelon.com/node_modules/.cache
            rm -rf vibetradez.com/client/.next vibetradez.com/client/node_modules/.cache

            COMMIT_SHA=$(git rev-parse HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)

            # Build all services
            docker compose build --no-cache jaycebordelon-com trading-server trading-frontend
            docker tag jaycebordelon.com:latest "jaycebordelon.com:${SHORT_SHA}"

  # ── Deploy (independent) ──────────────────────────────────────────

  deploy_portfolio:
    name: Deploy / Portfolio
    runs-on: ubuntu-latest
    needs: build
    outputs:
      commit_sha: ${{ steps.get_info.outputs.commit_sha }}
      short_sha: ${{ steps.get_info.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: get_info
        run: |
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy portfolio
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            docker rollout jaycebordelon-com --timeout 120 --wait-after-healthy 30
            docker compose up -d traefik

  deploy_trading:
    name: Deploy / Trading
    runs-on: ubuntu-latest
    needs: build
    outputs:
      commit_sha: ${{ steps.get_info.outputs.commit_sha }}
      short_sha: ${{ steps.get_info.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: get_info
        run: |
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy trading
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            docker rollout trading-frontend --timeout 120 --wait-after-healthy 30
            docker compose up -d --force-recreate trading-server
            docker compose up -d traefik

  # ── Post-deploy ───────────────────────────────────────────────────

  cleanup:
    name: Post-Deploy Cleanup
    runs-on: ubuntu-latest
    needs: [deploy_portfolio, deploy_trading]
    steps:
      - uses: actions/checkout@v4

      - name: Prune Docker resources
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            docker system prune -af --volumes
            for IMAGE in "jaycebordelon.com" "vibetradez.com-trading-server" "vibetradez.com-trading-frontend"; do
              docker images "$IMAGE" --format "{{.ID}} {{.CreatedAt}}" 2>/dev/null | sort -rk 2 | tail -n +4 | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true
            done

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy_portfolio, deploy_trading]
    outputs:
      status: ${{ steps.health.outputs.status }}
      results: ${{ steps.health.outputs.results }}
    steps:
      - name: Verify endpoints
        id: health
        run: |
          set -e

          ENDPOINTS=(
            "https://jaycebordelon.com"
            "https://www.jaycebordelon.com"
            "https://vibetradez.com"
            "https://vibetradez.com/dashboard"
          )

          FAILED=0
          RESULTS=""

          for endpoint in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$endpoint" || echo "000")

            if [[ "$STATUS" =~ ^2[0-9]{2}$ ]]; then
              RESULTS="${RESULTS}✓ $endpoint ($STATUS)\n"
            else
              RESULTS="${RESULTS}✗ $endpoint ($STATUS)\n"
              FAILED=1
            fi
          done

          # Granular trading server health
          RESULTS="${RESULTS}\n── Trading Server Services ──\n"
          HEALTH_JSON=$(curl -s --max-time 10 "https://vibetradez.com/health" || echo '{}')

          if echo "$HEALTH_JSON" | jq -e '.services' > /dev/null 2>&1; then
            UPTIME=$(echo "$HEALTH_JSON" | jq -r '.uptime // "unknown"')
            RESULTS="${RESULTS}Uptime: ${UPTIME}\n"

            for svc in $(echo "$HEALTH_JSON" | jq -r '.services | keys[]'); do
              SVC_STATUS=$(echo "$HEALTH_JSON" | jq -r ".services[\"$svc\"].status")
              SVC_DETAIL=$(echo "$HEALTH_JSON" | jq -r ".services[\"$svc\"].detail // \"-\"")
              SVC_LATENCY=$(echo "$HEALTH_JSON" | jq -r ".services[\"$svc\"].latency // \"-\"")

              if [ "$SVC_STATUS" = "ok" ]; then
                ICON="✓"
              elif [ "$SVC_STATUS" = "warn" ]; then
                ICON="⚠"
              else
                ICON="✗"
                FAILED=1
              fi

              RESULTS="${RESULTS}${ICON} ${svc}: ${SVC_DETAIL} (${SVC_LATENCY})\n"
            done
          else
            RESULTS="${RESULTS}✗ Could not parse health response\n"
            FAILED=1
          fi

          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 1 ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi

  # ── Notify (fires as soon as its deploy finishes) ─────────────────

  notify_portfolio:
    name: Notify / Portfolio
    runs-on: ubuntu-latest
    needs: deploy_portfolio
    if: always() && !cancelled()
    steps:
      - name: Send portfolio deploy notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: bordelonjayce@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ needs.deploy_portfolio.result == 'success' && 'PASSED' || 'FAILED' }}] jaycebordelon.com - ${{ needs.deploy_portfolio.outputs.short_sha || 'unknown' }}"
          to: bordelonjayce@gmail.com
          from: Jayce Bordelon <bordelonjayce@gmail.com>
          html_body: |
            <p style="font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a;">
              <strong>jaycebordelon.com</strong> deploy
              <span style="color: #475569;">${{ needs.deploy_portfolio.result == 'success' && '✓ PASSED' || '✗ FAILED' }}</span>
              &middot; <code style="color: #64748b;">${{ needs.deploy_portfolio.outputs.short_sha || 'unknown' }}</code>
              &middot; <a href="https://jaycebordelon.com" style="color: #475569;">Open site</a>
              &middot; <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color: #475569;">Workflow</a>
            </p>

  notify_trading:
    name: Notify / Trading
    runs-on: ubuntu-latest
    needs: deploy_trading
    if: always() && !cancelled()
    steps:
      - name: Send trading deploy notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: bordelonjayce@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ needs.deploy_trading.result == 'success' && 'PASSED' || 'FAILED' }}] vibetradez.com - ${{ needs.deploy_trading.outputs.short_sha || 'unknown' }}"
          to: bordelonjayce@gmail.com
          from: Vibe Tradez <trades@vibetradez.com>
          html_body: |
            <p style="font-family: sans-serif;">
              <strong>vibetradez.com</strong> deploy
              ${{ needs.deploy_trading.result == 'success' && '✓ PASSED' || '✗ FAILED' }}
              &middot; <code>${{ needs.deploy_trading.outputs.short_sha || 'unknown' }}</code>
              &middot; <a href="https://vibetradez.com">Open site</a>
              &middot; <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Workflow</a>
            </p>

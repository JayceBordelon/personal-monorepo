name: Jayce Land - CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  PROJECT_PATH: /home/jayce/personal-monorepo
  REPO_URL: git@github.com:JayceBordelon/personal-monorepo.git

jobs:
  sync:
    name: Sync
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      repo_url: git@github.com:JayceBordelon/personal-monorepo.git

  lint:
    name: Lint
    needs: sync
    if: success()
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo

  build_portfolio:
    name: Build / Portfolio
    needs: sync
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: jaycebordelon-com

  build_frontend:
    name: Build / Trading Frontend
    needs: sync
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: trading-frontend

  build_server:
    name: Build / Trading Server
    needs: sync
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: trading-server

  deploy:
    name: Deploy
    needs: [build_portfolio, build_frontend, build_server]
    if: success()
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo

  cleanup:
    name: Cleanup
    needs: deploy
    if: success()
    uses: ./.github/workflows/cleanup.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo

  healthcheck:
    name: Health Check
    needs: deploy
    if: success()
    uses: ./.github/workflows/healthcheck.yml
    secrets: inherit

  notify:
    name: Notify
    needs: [sync, lint, build_portfolio, build_frontend, build_server, deploy, cleanup, healthcheck]
    if: always()
    uses: ./.github/workflows/notify.yml
    secrets: inherit
    with:
      sync_status: ${{ needs.sync.result == 'success' && needs.sync.outputs.status || (needs.sync.result == 'skipped' && '○ Not Run' || '✗ FAILED') }}
      sync_error: ${{ needs.sync.outputs.error || '' }}
      lint_status: ${{ needs.lint.result == 'success' && needs.lint.outputs.status || (needs.lint.result == 'skipped' && '○ Not Run' || '✗ FAILED') }}
      lint_error: ${{ needs.lint.outputs.error || '' }}
      build_status: |
        Portfolio: ${{ needs.build_portfolio.result == 'success' && needs.build_portfolio.outputs.status || (needs.build_portfolio.result == 'skipped' && '○ Not Run' || '✗ FAILED') }} • Frontend: ${{ needs.build_frontend.result == 'success' && needs.build_frontend.outputs.status || (needs.build_frontend.result == 'skipped' && '○ Not Run' || '✗ FAILED') }} • Server: ${{ needs.build_server.result == 'success' && needs.build_server.outputs.status || (needs.build_server.result == 'skipped' && '○ Not Run' || '✗ FAILED') }}
      build_error: |
        ${{ needs.build_portfolio.outputs.error || '' }}${{ needs.build_frontend.outputs.error && format(' | {0}', needs.build_frontend.outputs.error) || '' }}${{ needs.build_server.outputs.error && format(' | {0}', needs.build_server.outputs.error) || '' }}
      deploy_status: ${{ needs.deploy.result == 'success' && needs.deploy.outputs.status || (needs.deploy.result == 'skipped' && '○ Not Run' || '✗ FAILED') }}
      deploy_error: ${{ needs.deploy.outputs.error || '' }}
      deploy_commit_sha: ${{ needs.deploy.outputs.commit_sha || github.sha }}
      deploy_short_sha: ${{ needs.deploy.outputs.short_sha || 'unknown' }}
      deploy_commit_message: ${{ needs.deploy.outputs.commit_message || 'No message' }}
      deploy_commit_author: ${{ needs.deploy.outputs.commit_author || github.actor }}
      deploy_commit_timestamp: ${{ needs.deploy.outputs.commit_timestamp || 'Unknown' }}
      cleanup_status: ${{ needs.cleanup.result == 'success' && needs.cleanup.outputs.status || (needs.cleanup.result == 'skipped' && '○ Not Run' || '✗ FAILED') }}
      cleanup_error: ${{ needs.cleanup.outputs.error || '' }}
      healthcheck_status: ${{ needs.healthcheck.result == 'success' && needs.healthcheck.outputs.status || (needs.healthcheck.result == 'skipped' && '○ Not Run' || '✗ FAILED') }}
      healthcheck_error: ${{ needs.healthcheck.outputs.error || '' }}
      healthcheck_results: ${{ needs.healthcheck.outputs.results || 'No results' }}

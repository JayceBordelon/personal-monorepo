name: CI/CD Pipeline

on:
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  PROJECT_PATH: /home/jayce/jaycestuff
  REPO_URL: git@github.com:JayceBordelon/jaycestuff.git

jobs:
  sync:
    name: Sync
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff
      repo_url: git@github.com:JayceBordelon/jaycestuff.git

  lint_portfolio:
    name: Lint / Portfolio
    needs: sync
    if: success()
    uses: ./.github/workflows/lint-portfolio.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  lint_trading_frontend:
    name: Lint / Trading Frontend
    needs: sync
    if: success()
    uses: ./.github/workflows/lint-trading-frontend.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  lint_trading_server:
    name: Lint / Trading Server
    needs: sync
    if: success()
    uses: ./.github/workflows/lint-trading-server.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  # Serialized after trading-server lint because both SSH into the same
  # droplet and golangci-lint refuses to run concurrently with itself
  # (global process lock — fails with "parallel golangci-lint is
  # running"). Adds ~30-60s wall time but eliminates the race entirely
  # without needing per-job cache-dir gymnastics.
  lint_auth_service:
    name: Lint / Auth Service
    needs: [sync, lint_trading_server]
    if: success()
    uses: ./.github/workflows/lint-auth-service.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  # ── Build (single compose invocation, waits on all lints) ─────────

  build:
    name: Build
    needs: [lint_portfolio, lint_trading_frontend, lint_trading_server, lint_auth_service]
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  # ── Deploy (both sites in one job, continue-on-error per side) ────

  deploy:
    name: Deploy
    needs: build
    if: success()
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  # ── Notify (one consolidated email, fires after deploy) ───────────

  notify:
    name: Notify
    needs: deploy
    if: always() && !cancelled()
    uses: ./.github/workflows/notify.yml
    secrets: inherit
    with:
      overall_status: ${{ needs.deploy.outputs.overall_status || '✗ FAILED' }}
      portfolio_status: ${{ needs.deploy.outputs.portfolio_status || '✗ FAILED' }}
      trading_status: ${{ needs.deploy.outputs.trading_status || '✗ FAILED' }}
      deploy_error: ${{ needs.deploy.outputs.error || 'Deploy did not run' }}
      commit_sha: ${{ needs.deploy.outputs.commit_sha || github.sha }}
      short_sha: ${{ needs.deploy.outputs.short_sha || 'unknown' }}
      commit_message: ${{ needs.deploy.outputs.commit_message || 'No message' }}
      commit_author: ${{ needs.deploy.outputs.commit_author || github.actor }}
      commit_timestamp: ${{ needs.deploy.outputs.commit_timestamp || 'Unknown' }}

  # ── Post-deploy ───────────────────────────────────────────────────

  cleanup:
    name: Cleanup
    needs: deploy
    if: success()
    uses: ./.github/workflows/cleanup.yml
    secrets: inherit
    with:
      project_path: /home/jayce/jaycestuff

  healthcheck:
    name: Health Check
    needs: deploy
    if: success()
    uses: ./.github/workflows/healthcheck.yml
    secrets: inherit

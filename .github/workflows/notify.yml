name: Notify

on:
  workflow_call:
    inputs:
      overall_status:
        required: false
        type: string
        default: "✓ PASSED"
      portfolio_status:
        required: false
        type: string
        default: "✓ PASSED"
      trading_status:
        required: false
        type: string
        default: "✓ PASSED"
      deploy_error:
        required: false
        type: string
        default: ""
      commit_sha:
        required: false
        type: string
        default: "unknown"
      short_sha:
        required: false
        type: string
        default: "unknown"
      commit_message:
        required: false
        type: string
        default: "No commit message"
      commit_author:
        required: false
        type: string
        default: "Unknown"
      commit_timestamp:
        required: false
        type: string
        default: "Unknown"

jobs:
  notify:
    name: Send Email
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        env:
          OVERALL_STATUS: ${{ inputs.overall_status }}
          PORTFOLIO_STATUS: ${{ inputs.portfolio_status }}
          TRADING_STATUS: ${{ inputs.trading_status }}
        run: |
          if [[ "$OVERALL_STATUS" == *"FAILED"* ]]; then
            echo "result=FAILED" >> $GITHUB_OUTPUT
          else
            echo "result=PASSED" >> $GITHUB_OUTPUT
          fi

          if [[ "$PORTFOLIO_STATUS" == *"FAILED"* ]]; then
            echo "portfolio=FAILED" >> $GITHUB_OUTPUT
          else
            echo "portfolio=PASSED" >> $GITHUB_OUTPUT
          fi

          if [[ "$TRADING_STATUS" == *"FAILED"* ]]; then
            echo "trading=FAILED" >> $GITHUB_OUTPUT
          else
            echo "trading=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Fetch trading server health
        id: health
        run: |
          sleep 15

          HEALTH_JSON=$(curl -sf --max-time 15 "https://vibetradez.com/health" 2>/dev/null || echo '{}')

          ROWS=""
          if echo "$HEALTH_JSON" | jq -e '.services' > /dev/null 2>&1; then
            UPTIME=$(echo "$HEALTH_JSON" | jq -r '.uptime // "unknown"')
            OK=$(echo "$HEALTH_JSON" | jq -r '.ok')

            for svc in $(echo "$HEALTH_JSON" | jq -r '.services | keys[]'); do
              SVC_STATUS=$(echo "$HEALTH_JSON" | jq -r ".services[\"$svc\"].status")
              SVC_DETAIL=$(echo "$HEALTH_JSON" | jq -r ".services[\"$svc\"].detail // \"-\"")
              SVC_LATENCY=$(echo "$HEALTH_JSON" | jq -r ".services[\"$svc\"].latency // \"-\"")

              if [ "$SVC_STATUS" = "ok" ]; then
                COLOR="#475569"
                BADGE_BG="#f1f5f9"
                BADGE_COLOR="#0f172a"
                BADGE_TEXT="OK"
              elif [ "$SVC_STATUS" = "warn" ]; then
                COLOR="#b45309"
                BADGE_BG="#fef3c7"
                BADGE_COLOR="#b45309"
                BADGE_TEXT="WARN"
              else
                COLOR="#ef4444"
                BADGE_BG="#fef2f2"
                BADGE_COLOR="#ef4444"
                BADGE_TEXT="FAIL"
              fi

              ROWS="${ROWS}<tr><td style=\"padding: 8px 12px; border-bottom: 1px solid #f1f5f9;\"><span style=\"color: ${COLOR}; font-size: 11px;\">&#9679;</span> <span style=\"color: #0f172a; font-size: 13px; font-weight: 600;\">${svc}</span><br><span style=\"color: #94a3b8; font-size: 11px;\">${SVC_DETAIL}</span></td><td style=\"padding: 8px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: top;\"><span style=\"font-family: monospace; font-size: 11px; color: #64748b;\">${SVC_LATENCY}</span></td><td style=\"padding: 8px 12px; border-bottom: 1px solid #f1f5f9; text-align: right; vertical-align: top;\"><span style=\"background: ${BADGE_BG}; color: ${BADGE_COLOR}; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9999px;\">${BADGE_TEXT}</span></td></tr>"
            done

            echo "uptime=$UPTIME" >> $GITHUB_OUTPUT
            echo "all_ok=$OK" >> $GITHUB_OUTPUT
          else
            ROWS="<tr><td colspan=\"3\" style=\"padding: 12px; color: #94a3b8; font-size: 13px;\">Health endpoint unavailable</td></tr>"
            echo "uptime=unknown" >> $GITHUB_OUTPUT
            echo "all_ok=false" >> $GITHUB_OUTPUT
          fi

          echo "rows<<EOF" >> $GITHUB_OUTPUT
          echo "$ROWS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send deploy notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: bordelonjayce@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ steps.status.outputs.result }}] jaycestuff - ${{ inputs.short_sha }}"
          to: bordelonjayce@gmail.com
          from: Jayce Bordelon <bordelonjayce@gmail.com>
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body {
                  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                  background-color: #fafafa;
                  margin: 0;
                  padding: 40px 20px;
                  -webkit-font-smoothing: antialiased;
                }
                .container {
                  max-width: 580px;
                  margin: 0 auto;
                  background-color: #ffffff;
                  border-radius: 12px;
                  overflow: hidden;
                  border: 1px solid #e2e8f0;
                  box-shadow: 0 1px 3px 0 rgba(15, 23, 42, 0.06);
                }
                .brand-bar {
                  height: 4px;
                  background: linear-gradient(90deg, #475569, #94a3b8);
                }
                .header {
                  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                  padding: 32px 28px;
                  text-align: center;
                }
                .header h1 {
                  color: #f1f5f9;
                  font-size: 22px;
                  font-weight: 800;
                  margin: 0 0 6px 0;
                  letter-spacing: -0.3px;
                }
                .header p {
                  color: #94a3b8;
                  font-size: 13px;
                  margin: 0;
                  font-weight: 500;
                }
                .status-badge {
                  display: inline-block;
                  padding: 5px 14px;
                  border-radius: 6px;
                  font-weight: 700;
                  font-size: 13px;
                  margin-top: 12px;
                }
                .status-passed {
                  background: #475569;
                  color: #ffffff;
                }
                .status-failed {
                  background: #ef4444;
                  color: #ffffff;
                }
                .content {
                  padding: 28px;
                }
                .section {
                  margin-bottom: 24px;
                }
                .section:last-child {
                  margin-bottom: 0;
                }
                .section h3 {
                  color: #0f172a;
                  font-size: 11px;
                  font-weight: 700;
                  margin: 0 0 12px 0;
                  text-transform: uppercase;
                  letter-spacing: 0.08em;
                }
                .info-box {
                  background-color: #f8fafc;
                  border-radius: 8px;
                  padding: 20px;
                  border: 1px solid #e2e8f0;
                }
                .info-row {
                  padding: 6px 0;
                  font-size: 13px;
                }
                .info-label {
                  color: #94a3b8;
                  font-weight: 500;
                }
                .info-value {
                  color: #0f172a;
                  font-weight: 600;
                  word-break: break-all;
                }
                .error-box {
                  background-color: #fef2f2;
                  border: 1px solid #fecaca;
                  border-radius: 8px;
                  padding: 16px 20px;
                  color: #dc2626;
                  font-size: 13px;
                  line-height: 1.6;
                  font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
                  word-break: break-word;
                }
                .cta {
                  display: inline-block;
                  padding: 10px 24px;
                  background: #475569;
                  color: #ffffff !important;
                  font-size: 13px;
                  font-weight: 600;
                  text-decoration: none;
                  border-radius: 8px;
                }
                .links-box {
                  background-color: #f8fafc;
                  padding: 16px 20px;
                  border-radius: 8px;
                  border: 1px solid #e2e8f0;
                  line-height: 2;
                  font-size: 13px;
                }
                .footer-bar {
                  height: 3px;
                  background: linear-gradient(90deg, #475569, #94a3b8);
                }
                .footer {
                  background-color: #f1f5f9;
                  padding: 16px 28px;
                  text-align: center;
                }
                a {
                  color: #475569;
                  text-decoration: none;
                }
                a:hover {
                  text-decoration: underline;
                }
                .site-row {
                  padding: 10px 12px;
                  border-bottom: 1px solid #f1f5f9;
                  display: table;
                  width: 100%;
                }
                .site-row:last-child {
                  border-bottom: none;
                }
                .site-name {
                  display: table-cell;
                  color: #0f172a;
                  font-size: 13px;
                  font-weight: 600;
                  vertical-align: middle;
                }
                .site-status {
                  display: table-cell;
                  text-align: right;
                  vertical-align: middle;
                  font-size: 11px;
                  font-weight: 700;
                }
                .site-status.passed {
                  color: #0f172a;
                }
                .site-status.failed {
                  color: #ef4444;
                }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="brand-bar"></div>
                <div class="header">
                  <h1>jaycestuff</h1>
                  <p>Deploy</p>
                  <span class="status-badge status-${{ steps.status.outputs.result == 'FAILED' && 'failed' || 'passed' }}">
                    ${{ steps.status.outputs.result == 'FAILED' && '✗ FAILED' || '✓ PASSED' }}
                  </span>
                </div>

                <div class="content">
                  ${{ steps.status.outputs.result == 'FAILED' && inputs.deploy_error != '' && format('<div class="section"><h3>Error</h3><div class="error-box">{0}</div></div>', inputs.deploy_error) || '' }}

                  <div class="section">
                    <h3>Sites</h3>
                    <div class="info-box" style="padding: 0;">
                      <div class="site-row">
                        <span class="site-name">jaycebordelon.com</span>
                        <span class="site-status ${{ steps.status.outputs.portfolio == 'FAILED' && 'failed' || 'passed' }}">${{ steps.status.outputs.portfolio == 'FAILED' && '✗ FAILED' || '✓ PASSED' }}</span>
                      </div>
                      <div class="site-row">
                        <span class="site-name">vibetradez.com</span>
                        <span class="site-status ${{ steps.status.outputs.trading == 'FAILED' && 'failed' || 'passed' }}">${{ steps.status.outputs.trading == 'FAILED' && '✗ FAILED' || '✓ PASSED' }}</span>
                      </div>
                    </div>
                  </div>

                  <div class="section">
                    <h3>Commit</h3>
                    <div class="info-box">
                      <div class="info-row">
                        <span class="info-label">Message</span><br>
                        <span class="info-value">${{ inputs.commit_message }}</span>
                      </div>
                      <div class="info-row">
                        <span class="info-label">Author</span><br>
                        <span class="info-value">${{ inputs.commit_author }}</span>
                      </div>
                      <div class="info-row">
                        <span class="info-label">SHA</span><br>
                        <span class="info-value">${{ inputs.commit_sha }}</span>
                      </div>
                      <div class="info-row">
                        <span class="info-label">Timestamp</span><br>
                        <span class="info-value">${{ inputs.commit_timestamp }}</span>
                      </div>
                    </div>
                  </div>

                  <div class="section">
                    <h3>Trading Server Health <span style="font-weight: 500; text-transform: none; letter-spacing: normal; color: #94a3b8;">&middot; uptime ${{ steps.health.outputs.uptime }}</span></h3>
                    <div class="info-box" style="padding: 0; overflow: hidden;">
                      <table width="100%" cellspacing="0" cellpadding="0" style="font-family: 'Plus Jakarta Sans', sans-serif;">
                        <tr style="background-color: #f8fafc;">
                          <td style="padding: 8px 12px; border-bottom: 1px solid #e2e8f0;"><span style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8;">Service</span></td>
                          <td style="padding: 8px 8px; border-bottom: 1px solid #e2e8f0; text-align: center;"><span style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8;">Latency</span></td>
                          <td style="padding: 8px 12px; border-bottom: 1px solid #e2e8f0; text-align: right;"><span style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8;">Status</span></td>
                        </tr>
                        ${{ steps.health.outputs.rows }}
                      </table>
                    </div>
                  </div>

                  <div class="section">
                    <h3>Links</h3>
                    <div class="links-box">
                      <a href="https://jaycebordelon.com">jaycebordelon.com</a><br>
                      <a href="https://vibetradez.com">vibetradez.com</a><br>
                      <a href="${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.commit_sha }}">View Commit on GitHub</a><br>
                      <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run #${{ github.run_number }}</a>
                    </div>
                  </div>

                  <div class="section" style="text-align: center;">
                    <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" class="cta">View Workflow Run</a>
                  </div>
                </div>

                <div class="footer-bar"></div>
                <div class="footer">
                  <p style="margin: 0;">
                    <span style="font-size: 14px; font-weight: 700; color: #0f172a;">Jayce Bordelon</span>
                    <span style="color: #94a3b8; font-size: 11px;">&nbsp;&middot;&nbsp;Deployment Pipeline</span>
                  </p>
                </div>
              </div>
            </body>
            </html>

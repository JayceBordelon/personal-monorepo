name: Build

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
    outputs:
      status:
        description: "Build status"
        value: ${{ jobs.build.outputs.status }}
      error:
        description: "Build error message"
        value: ${{ jobs.build.outputs.error }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build_status.outputs.status }}
      error: ${{ steps.build_status.outputs.error }}
    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        id: build_run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ inputs.project_path }}

            SHORT_SHA=$(git rev-parse --short HEAD)

            # Drop stale Next.js build caches so a previous run can't
            # poison the new images. The Go server has no node/next
            # caches to clear.
            rm -rf jaycebordelon.com/.next jaycebordelon.com/node_modules/.cache
            rm -rf vibetradez.com/client/.next vibetradez.com/client/node_modules/.cache

            # Single compose invocation builds every service in one pass.
            docker compose build --no-cache jaycebordelon-com trading-server trading-frontend

            # Tag the portfolio image with the short SHA so cleanup.yml
            # can prune older tagged images.
            docker tag jaycebordelon.com:latest "jaycebordelon.com:${SHORT_SHA}"

      - name: Set build status
        id: build_status
        if: always()
        run: |
          if [ "${{ steps.build_run.outcome }}" == "success" ]; then
            echo "status=✓ PASSED" >> $GITHUB_OUTPUT
            echo "error=" >> $GITHUB_OUTPUT
          else
            echo "status=✗ FAILED" >> $GITHUB_OUTPUT
            echo "error=Docker build failed - check build logs and dependencies" >> $GITHUB_OUTPUT
          fi

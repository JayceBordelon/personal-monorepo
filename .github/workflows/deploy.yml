name: Deploy

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
    outputs:
      commit_sha:
        description: "Full commit SHA"
        value: ${{ jobs.deploy.outputs.commit_sha }}
      short_sha:
        description: "Short commit SHA"
        value: ${{ jobs.deploy.outputs.short_sha }}
      commit_message:
        description: "Commit message"
        value: ${{ jobs.deploy.outputs.commit_message }}
      commit_author:
        description: "Commit author"
        value: ${{ jobs.deploy.outputs.commit_author }}
      commit_timestamp:
        description: "Commit timestamp"
        value: ${{ jobs.deploy.outputs.commit_timestamp }}
      portfolio_status:
        description: "Portfolio deploy status ('✓ PASSED' or '✗ FAILED')"
        value: ${{ jobs.deploy.outputs.portfolio_status }}
      trading_status:
        description: "Trading deploy status ('✓ PASSED' or '✗ FAILED')"
        value: ${{ jobs.deploy.outputs.trading_status }}
      overall_status:
        description: "Overall deploy status. '✓ PASSED' only if both sites succeeded."
        value: ${{ jobs.deploy.outputs.overall_status }}
      error:
        description: "Combined error message when either side failed"
        value: ${{ jobs.deploy.outputs.error }}

jobs:
  deploy:
    name: Rolling Deployment
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.get_info.outputs.commit_sha }}
      short_sha: ${{ steps.get_info.outputs.short_sha }}
      commit_message: ${{ steps.get_info.outputs.commit_message }}
      commit_author: ${{ steps.get_info.outputs.commit_author }}
      commit_timestamp: ${{ steps.get_info.outputs.commit_timestamp }}
      portfolio_status: ${{ steps.deploy_status.outputs.portfolio_status }}
      trading_status: ${{ steps.deploy_status.outputs.trading_status }}
      overall_status: ${{ steps.deploy_status.outputs.overall_status }}
      error: ${{ steps.deploy_status.outputs.error }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: get_info
        run: |
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

          COMMIT_MESSAGE=$(git log -1 --pretty=%B | head -n 1)
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT

          COMMIT_TIMESTAMP=$(git log -1 --pretty=format:'%aI')
          echo "commit_timestamp=$COMMIT_TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Deploy portfolio
        id: deploy_portfolio
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ inputs.project_path }}
            docker rollout jaycebordelon-com --timeout 120 --wait-after-healthy 30

      - name: Deploy trading
        id: deploy_trading
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ inputs.project_path }}
            docker rollout trading-frontend --timeout 120 --wait-after-healthy 30
            docker compose up -d --force-recreate trading-server

      - name: Ensure Traefik is up
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ inputs.project_path }}
            docker compose up -d traefik

      - name: Compute deploy status
        id: deploy_status
        if: always()
        run: |
          PORTFOLIO="${{ steps.deploy_portfolio.outcome }}"
          TRADING="${{ steps.deploy_trading.outcome }}"

          if [ "$PORTFOLIO" = "success" ]; then
            echo "portfolio_status=✓ PASSED" >> $GITHUB_OUTPUT
          else
            echo "portfolio_status=✗ FAILED" >> $GITHUB_OUTPUT
          fi

          if [ "$TRADING" = "success" ]; then
            echo "trading_status=✓ PASSED" >> $GITHUB_OUTPUT
          else
            echo "trading_status=✗ FAILED" >> $GITHUB_OUTPUT
          fi

          ERRORS=""
          if [ "$PORTFOLIO" != "success" ]; then
            ERRORS="${ERRORS}jaycebordelon-com rollout failed. "
          fi
          if [ "$TRADING" != "success" ]; then
            ERRORS="${ERRORS}vibetradez.com deploy failed (trading-frontend or trading-server). "
          fi

          if [ -z "$ERRORS" ]; then
            echo "overall_status=✓ PASSED" >> $GITHUB_OUTPUT
            echo "error=" >> $GITHUB_OUTPUT
          else
            echo "overall_status=✗ FAILED" >> $GITHUB_OUTPUT
            echo "error=$ERRORS" >> $GITHUB_OUTPUT
          fi

      - name: Fail job if any deploy failed
        if: steps.deploy_status.outputs.overall_status == '✗ FAILED'
        run: |
          echo "${{ steps.deploy_status.outputs.error }}"
          exit 1

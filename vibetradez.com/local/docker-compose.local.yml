name: vibetradez-local

# Local development stack for VibeTradez + the centralized auth service.
#
# Spins up Postgres (two databases: vibetradez + auth), the Go auth service,
# the Go trading API server, and the Next.js frontend. No Traefik — services
# talk directly over the Docker network.
#
# Usage:
#   cd vibetradez.com/local
#   docker compose -f docker-compose.local.yml up --build
#
# Then visit:
#   http://localhost:3001        — Next.js frontend
#   http://localhost:8080/health — trading server health
#   http://localhost:8081/health — auth service health
#
# Tear down (and clear seeded data):
#   docker compose -f docker-compose.local.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: vt-local-postgres
    environment:
      POSTGRES_USER: vibetradez
      POSTGRES_PASSWORD: vibetradez
      POSTGRES_DB: vibetradez
    ports:
      - "5433:5432"
    volumes:
      - vt_local_pgdata:/var/lib/postgresql/data
      # Init scripts run in lexical order on first boot only. The auth DB
      # must be created before vibetradez seed data references it (it doesn't,
      # but keep the ordering predictable: 00 creates, 01 seeds).
      - ./init-auth-db.sql:/docker-entrypoint-initdb.d/00-init-auth-db.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibetradez -d vibetradez"]
      interval: 3s
      timeout: 3s
      retries: 10

  auth-service:
    container_name: vt-local-auth
    build:
      context: ../../auth.jaycebordelon.com
      dockerfile: Dockerfile
    environment:
      AUTH_DATABASE_URL: postgresql://vibetradez:vibetradez@postgres:5432/auth?sslmode=disable
      AUTH_SERVER_PORT: "8081"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-stub-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-stub-google-client-secret}
      GOOGLE_CALLBACK_URL: http://localhost:8081/auth/google/callback
      IDP_COOKIE_NAME: aj_session
      IDP_COOKIE_TTL_DAYS: "30"
      ACCESS_TOKEN_TTL_DAYS: "30"
      AUTH_CODE_TTL_SECONDS: "60"
      # Registered consumer apps. Each entry is {id, secret, name,
      # redirect_uris[]}. vibetradez is the only one for now. Matches
      # VT_AUTH_CLIENT_ID / VT_AUTH_CLIENT_SECRET on trading-server below.
      OAUTH_CLIENTS_JSON: >-
        [{"id":"vibetradez","secret":"local-vibetradez-secret","name":"VibeTradez","redirect_uris":["http://localhost:3001/auth/sso/callback"]}]
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  trading-server:
    container_name: vt-local-server
    build:
      context: ../server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://vibetradez:vibetradez@postgres:5432/vibetradez?sslmode=disable
      # Stub keys — server requires these to start, but local mode never calls real APIs.
      RESEND_API_KEY: re_local_stub
      OPENAI_API_KEY: sk_local_stub
      ANTHROPIC_API_KEY: sk-local-stub
      OPENAI_MODEL: gpt-5.5
      ANTHROPIC_MODEL: claude-opus-4-7
      EMAIL_FROM: "Local Dev <local@vibetradez.local>"
      EMAIL_RECIPIENTS: ""
      RUN_ON_START: "false"
      # /api/quotes/live returns synthetic option marks so the dashboard's
      # Buy/Current cards have something to render without a real Schwab
      # OAuth flow. Production never sets this var, so its empty-response
      # branch still wins there.
      LOCAL_MOCK_QUOTES: "1"
      # Push cron jobs far out so they never fire during local dev.
      CRON_SCHEDULE_OPEN: "0 9 * * 0"
      CRON_SCHEDULE_CLOSE: "0 16 * * 0"
      CRON_SCHEDULE_WEEKLY: "0 17 * * 0"
      # Auth client credentials — trading-server registers as a consumer of
      # the auth service. Secret must match OAUTH_CLIENTS_JSON above.
      VT_AUTH_BASE_URL: http://auth-service:8081
      VT_AUTH_PUBLIC_URL: http://localhost:8081
      VT_AUTH_CLIENT_ID: vibetradez
      VT_AUTH_CLIENT_SECRET: local-vibetradez-secret
      VT_AUTH_REDIRECT_URI: http://localhost:3001/auth/sso/callback
      SESSION_COOKIE_NAME: vt_session
      SESSION_TTL_DAYS: "30"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  trading-frontend:
    container_name: vt-local-frontend
    build:
      context: ../client
      dockerfile: Dockerfile
    environment:
      # Server-side fetches (Server Components) hit the Go server via the Docker network.
      API_URL: http://trading-server:8080
      # Client-side fetches go through the browser at /api/* — but in local dev with no
      # reverse proxy, the browser hits the Next.js host directly. To make /api/* work
      # without Traefik, the frontend rewrites /api/* and /auth/* and /admin/* and /health
      # to the Go server. See next.config.local.ts in this directory.
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3001:3001"
    depends_on:
      - trading-server
    restart: unless-stopped

volumes:
  vt_local_pgdata:

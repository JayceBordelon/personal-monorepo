name: vibetradez-local

# Local development stack for VibeTradez.
#
# Spins up a Postgres database (auto-seeded with realistic test data),
# the Go API server, and the Next.js frontend. No Traefik — the frontend
# proxies API calls directly to the server via the Docker network.
#
# Usage:
#   cd vibetradez.com/local
#   docker compose -f docker-compose.local.yml up --build
#
# Then visit:
#   http://localhost:3001        — Next.js frontend
#   http://localhost:8080/health — Go API health check
#
# Tear down (and clear seeded data):
#   docker compose -f docker-compose.local.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: vt-local-postgres
    environment:
      POSTGRES_USER: vibetradez
      POSTGRES_PASSWORD: vibetradez
      POSTGRES_DB: vibetradez
    ports:
      - "5433:5432"
    volumes:
      - vt_local_pgdata:/var/lib/postgresql/data
      # Seed file is mounted into the docker-entrypoint-initdb.d directory.
      # Postgres runs every .sql file in this directory on first boot only.
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibetradez -d vibetradez"]
      interval: 3s
      timeout: 3s
      retries: 10

  trading-server:
    container_name: vt-local-server
    build:
      context: ../server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://vibetradez:vibetradez@postgres:5432/vibetradez?sslmode=disable
      # Stub keys — server requires these to start, but local mode never calls real APIs.
      RESEND_API_KEY: re_local_stub
      OPENAI_API_KEY: sk_local_stub
      ANTHROPIC_API_KEY: sk-local-stub
      OPENAI_MODEL: gpt-5.4
      ANTHROPIC_MODEL: claude-opus-4-6
      EMAIL_FROM: "Local Dev <local@vibetradez.local>"
      EMAIL_RECIPIENTS: ""
      RUN_ON_START: "false"
      # Push cron jobs far out so they never fire during local dev.
      CRON_SCHEDULE_OPEN: "0 9 * * 0"
      CRON_SCHEDULE_CLOSE: "0 16 * * 0"
      CRON_SCHEDULE_WEEKLY: "0 17 * * 0"
      ADMIN_KEY: local-admin-key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  trading-frontend:
    container_name: vt-local-frontend
    build:
      context: ../client
      dockerfile: Dockerfile
    environment:
      # Server-side fetches (Server Components) hit the Go server via the Docker network.
      API_URL: http://trading-server:8080
      # Client-side fetches go through the browser at /api/* — but in local dev with no
      # reverse proxy, the browser hits the Next.js host directly. To make /api/* work
      # without Traefik, the frontend rewrites /api/* and /auth/* and /admin/* and /health
      # to the Go server. See next.config.local.ts in this directory.
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3001:3001"
    depends_on:
      - trading-server
    restart: unless-stopped

volumes:
  vt_local_pgdata:

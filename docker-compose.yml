services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=bordelonjayce@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik_letsencrypt:/letsencrypt"
    networks:
      - app-network
    restart: unless-stopped

  jaycebordelon-com:
    image: jaycebordelon.com:latest
    build:
      context: ./jaycebordelon.com
    expose:
      - "3000"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "app=jaycebordelon.com"
      - "traefik.enable=true"
      # Main router for canonical domain
      - "traefik.http.routers.jaycebordelon.rule=Host(`jaycebordelon.com`) || Host(`www.jaycebordelon.com`)"
      - "traefik.http.routers.jaycebordelon.entrypoints=websecure"
      - "traefik.http.routers.jaycebordelon.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jaycebordelon.priority=10"
      - "traefik.http.services.jaycebordelon.loadbalancer.server.port=3000"
      # Redirect router for old domain
      - "traefik.http.routers.jayceb-redirect.rule=Host(`jayceb.com`) || Host(`www.jayceb.com`)"
      - "traefik.http.routers.jayceb-redirect.entrypoints=websecure"
      - "traefik.http.routers.jayceb-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jayceb-redirect.priority=5"
      - "traefik.http.routers.jayceb-redirect.middlewares=redirect-to-jaycebordelon"
      # Redirect middleware
      - "traefik.http.middlewares.redirect-to-jaycebordelon.redirectregex.regex=^https://(www\\.)?jaycebordelon\\.com(.*)"
      - "traefik.http.middlewares.redirect-to-jaycebordelon.redirectregex.replacement=https://jaycebordelon.com$${2}"
      - "traefik.http.middlewares.redirect-to-jaycebordelon.redirectregex.permanent=true"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: jaycetrades
      POSTGRES_PASSWORD: jaycetrades
      POSTGRES_DB: jaycetrades
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaycetrades"]
      interval: 5s
      timeout: 5s
      retries: 5

  trading-server:
    build:
      context: ./jaycetrades.com
    env_file:
      - .env
    expose:
      - "8080"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "app=trading-server"
      - "traefik.enable=true"
      - "traefik.http.routers.trading.rule=Host(`jaycetrades.com`) || Host(`www.jaycetrades.com`)"
      - "traefik.http.routers.trading.entrypoints=websecure"
      - "traefik.http.routers.trading.tls.certresolver=letsencrypt"
      - "traefik.http.services.trading.loadbalancer.server.port=8080"

volumes:
  traefik_letsencrypt:
  postgres_data:

networks:
  app-network:
    driver: bridge

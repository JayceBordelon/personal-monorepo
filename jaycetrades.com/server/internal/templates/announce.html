<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{{.Subject}}</title>
  <style>
    :root { color-scheme: light dark; supported-color-schemes: light dark; }
    @media (prefers-color-scheme: dark) {
      .body-bg { background-color: #0f172a !important; }
      .header-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important; }
      .content-bg { background-color: #1e293b !important; }
      .footer-bg { background-color: #1e293b !important; border-color: #334155 !important; }
      .text-primary { color: #f1f5f9 !important; }
      .text-secondary { color: #cbd5e1 !important; }
      .text-muted { color: #94a3b8 !important; }
      .divider { border-color: #334155 !important; }
    }
  </style>
</head>
<body class="body-bg" style="margin: 0; padding: 0; background-color: #fafafa; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="body-bg" style="background-color: #fafafa;">
    <tr>
      <td align="center" style="padding: 32px 16px;">
        <table role="presentation" cellspacing="0" cellpadding="0" style="width: 100%; max-width: 580px;">

          <!-- Header -->
          <tr>
            <td class="header-bg" style="padding: 28px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 12px 12px 0 0; text-align: center;">
              <span style="font-size: 28px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px;">Jayce</span><span style="font-size: 28px; font-weight: 800; color: #a78bfa; letter-spacing: -0.5px;">Trades</span>
              <div style="margin-top: 12px;">
                <span style="display: inline-block; background: rgba(255,255,255,0.1); color: #94a3b8; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;">{{.Badge}}</span>
              </div>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td class="content-bg" style="background-color: #ffffff; padding: 32px 28px;">
              <h1 class="text-primary" style="margin: 0 0 8px 0; font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px;">
                {{.Headline}}
              </h1>
              <p class="text-muted" style="margin: 0 0 24px 0; font-size: 13px; color: #64748b;">
                {{.Date}}
              </p>

              {{range .Sections}}
              <div style="margin-bottom: 20px;">
                {{if .Title}}
                <h3 class="text-primary" style="margin: 0 0 8px 0; font-size: 15px; font-weight: 700; color: #0f172a;">{{.Title}}</h3>
                {{end}}
                <p class="text-secondary" style="margin: 0; font-size: 14px; line-height: 1.7; color: #475569;">{{.Body}}</p>
              </div>
              {{end}}

              {{if .CTAText}}
              <div style="text-align: center; margin-top: 28px;">
                <a href="{{.CTAURL}}" style="display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f1f5f9; font-size: 14px; font-weight: 700; text-decoration: none; border-radius: 8px; letter-spacing: -0.2px;">{{.CTAText}}</a>
              </div>
              {{end}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="footer-bg" style="padding: 20px 28px; background-color: #f1f5f9; border-radius: 0 0 12px 12px; border-top: 1px solid #e2e8f0; text-align: center;">
              <p class="text-muted" style="margin: 0 0 8px 0; color: #64748b; font-size: 11px; line-height: 1.5;">
                You're receiving this because you're subscribed to JayceTrades alerts.
              </p>
              <p style="margin: 0;">
                <span class="text-primary" style="font-size: 14px; font-weight: 700; color: #0f172a;">Jayce</span><span style="font-size: 14px; font-weight: 700; color: #a78bfa;">Trades</span>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
